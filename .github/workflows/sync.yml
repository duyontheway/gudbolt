name: Nightly Upstream Sync (Vietnam Time)

on:
  schedule:
    # 18:00 UTC is 01:00 AM in Vietnam (ICT)
    - cron: '0 18 * * *'
  workflow_dispatch: # This lets you click a button to sync manually whenever you want

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    name: Sync latest commits from upstream repo

    steps:
    - name: Checkout target repo
      uses: actions/checkout@v4
      with:
        # Ensure it checks out the branch you are using for production
        ref: main 

    - name: Sync upstream changes
      id: sync
      uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
      with:
        target_repo_url: https://github.com/duyontheway/gudbolt.git
        target_branch: main
        upstream_repo_url: https://github.com/stackblitz-labs/bolt.diy.git
        upstream_branch: main
        test_mode: false # Set to true if you want to test without actually pushing changes first

    - name: Sync Check
      if: failure()
      run: |
        echo "[Error] Sync failed. This usually happens if there are major merge conflicts."
        exit 1
